server {
    listen 80;
    server_name ${NGINX_SERVER_NAME};

    # Docker DNS resolver with 10s cache
    resolver 127.0.0.11 valid=10s;

    client_max_body_size 64M;

    # Increase proxy buffer sizes for large GeoJSON responses
    proxy_buffering on;
    proxy_buffer_size 16k;
    proxy_buffers 8 32k;
    proxy_busy_buffers_size 64k;
    proxy_temp_file_write_size 64k;

    # Enable gzip compression
    gzip on;
    gzip_types application/json text/plain application/javascript text/css;
    gzip_min_length 1000;
    gzip_vary on;

    # PMTiles — serve directly for proper range-request support
    location /thaimap/ {
        alias /etc/nginx/thaimap/;
        add_header Accept-Ranges bytes;
        add_header Cache-Control "public, max-age=86400";
    }

    # Frontend - Next.js
    location / {
        set $nextjs_upstream http://nextjs:3000;
        proxy_pass $nextjs_upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # API - NestJS
    location /api {
        set $nestjs_upstream http://nestjs:3001;
        rewrite ^/api/(.*) /$1 break;
        proxy_pass $nestjs_upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # Health check
    location /nginx-health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }
}
