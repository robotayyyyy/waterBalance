version: '3.8'

services:
  postgres:
    image: imresamu/postgis:16-3.5-bookworm
    container_name: postgres_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DATABASE_USER}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD}
      POSTGRES_DB: ${DATABASE_NAME}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - ./.env:/app/.env:ro  # Mount root .env as read-only
      - postgres_data:/var/lib/postgresql/data
      - ./init-scripts:/docker-entrypoint-initdb.d
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DATABASE_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app-network

  nestjs:
    build:
      context: .
      dockerfile: ./backend/Dockerfile
    container_name: nestjs_api
    restart: unless-stopped
    volumes:
      - ./.env:/app/.env:ro  # Mount root .env as read-only
    expose:
      - "3001"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:3001/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  nextjs:
    build:
      context: .
      dockerfile: ./frontend/Dockerfile
    container_name: nextjs_app
    restart: unless-stopped
    volumes:
      - ./.env:/app/.env:ro  # Mount root .env as read-only (not needed at runtime for Next.js)
    expose:
      - "3000"
    depends_on:
      - nestjs
    networks:
      - app-network

  nginx:
    image: nginx:alpine
    container_name: nginx_proxy
    restart: unless-stopped
    environment:
      NGINX_SERVER_NAME: ${NGINX_SERVER_NAME:-localhost}
    volumes:
      - ./nginx.conf:/etc/nginx/templates/default.conf.template
    ports:
      - "${NGINX_PORT:-80}:80"
    depends_on:
      - nextjs
      - nestjs
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost/nginx-health"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  app-network:
    driver: bridge

volumes:
  postgres_data:
    driver: local
